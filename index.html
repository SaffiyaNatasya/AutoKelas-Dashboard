<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AutoKelas Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="script.js" defer></script>

</head>

<body>

<h1>✨ AutoKelas Dashboard ✨</h1>

<div class="container">

  <!-- 🌟 eLampu -->
  <div class="card">
    <h2>💡 eLampu</h2>

    <div class="status">
      <span id="lampDot" class="dot off"></span>
      <span id="lampStatus">OFF</span>
    </div>

    <button onclick="lampON()">ON</button>
    <button onclick="lampOFF()">OFF</button>
  </div>

  <!-- 🔌 eSoket -->
  <div class="card">
    <h2>🔌 eSoket</h2>

    <div class="status">
      <span id="socketDot" class="dot off"></span>
      <span id="socketStatus">OFF</span>
    </div>

    <button onclick="socketON()">ON</button>
    <button onclick="socketOFF()">OFF</button>
  </div>

  <!-- 🪪 eKehadiran -->
  <div class="card attendance">
    <h2>📋 eKehadiran</h2>

    <p><b>Name:</b> <span id="rfidName">-</span></p>
    <p><b>Date:</b> <span id="rfidDate">-</span></p>
    <p><b>Time:</b> <span id="rfidTime">-</span></p>

  </div>

</div>

</body>
</html>
