<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoKelas Dashboard</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

  <h1>AutoKelas Control Panel</h1>

  <div class="card">
    <h2>Socket 1</h2>
    <button onclick="sendCmd('autokelas/socket1/cmd','ON')">ON</button>
    <button onclick="sendCmd('autokelas/socket1/cmd','OFF')">OFF</button>
  </div>

  <div class="card">
    <h2>Socket 2</h2>
    <button onclick="sendCmd('autokelas/socket2/cmd','ON')">ON</button>
    <button onclick="sendCmd('autokelas/socket2/cmd','OFF')">OFF</button>
  </div>

  <div class="card">
    <h2>eLampu 1</h2>
    <button onclick="sendCmd('autokelas/elampu1/cmd','ON')">ON</button>
    <button onclick="sendCmd('autokelas/elampu1/cmd','OFF')">OFF</button>
  </div>

  <div class="card">
    <h2>eLampu 2</h2>
    <button onclick="sendCmd('autokelas/elampu2/cmd','ON')">ON</button>
    <button onclick="sendCmd('autokelas/elampu2/cmd','OFF')">OFF</button>
  </div>

  <script src="js/script.js"></script>

</body>
</html>
